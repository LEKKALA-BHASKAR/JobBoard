<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Postline is a curated job board for engineers, designers, product managers, and operators — real listings from real teams, no clutter." />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Postline" />
    <meta property="og:title" content="Postline — Find your next role" />
    <meta property="og:description" content="A curated job board for engineers, designers, product, sales, marketing, and data teams." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <script>
      // Editorial cream light theme is the only supported look. Force it on
      // every load and clear any stale saved value so previous sessions that
      // stored 'dark' during earlier design iterations no longer stick.
      (function () {
        try {
          localStorage.setItem('postline.theme', 'light');
        } catch (_) {}
        document.documentElement.classList.remove('dark');
        document.documentElement.style.colorScheme = 'light';
      })();
    </script>

    <title>Postline — Find your next role</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
